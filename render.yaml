# render.yaml
services:
  - type: web
    name: dolly-chatbot-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
    disk:
      name: dolly-model-storage
      mountPath: /opt/render/model
      sizeGB: 5
